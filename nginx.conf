worker_processes auto;      

events {
    worker_connections 1024;
}

http {

    # ------------------------------------------------------------------
    # Upstream pool — the three Django/Gunicorn instances
    # ------------------------------------------------------------------
    upstream django_cluster {

        # Least Connections: new requests go to the worker with the
        # fewest open connections at this moment.
        least_conn;

        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;

        # keepalive: reuse up to 32 idle upstream connections instead of
        # opening a new TCP connection for every request — reduces latency
        # and OS resource usage under high load.
        keepalive 32;
    }

    # ------------------------------------------------------------------
    # Server block — accepts all incoming traffic on port 80
    # ------------------------------------------------------------------
    server {
        listen 30;
        server_name localhost;

        # Forward all API requests to the Django cluster
        location / {
            proxy_pass         http://django_cluster;
            proxy_http_version 1.1;

            # Required for keepalive to work with upstream
            proxy_set_header   Connection "";

            # Pass the real client IP so Django's logging shows it
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts — adjusted for slow order-creation endpoints
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;
        }
    }
}




